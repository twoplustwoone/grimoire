services:
  postgres:
    image: postgres:16-alpine
    container_name: grimoire-db
    environment:
      POSTGRES_USER: grimoire
      POSTGRES_PASSWORD: grimoire
      POSTGRES_DB: grimoire
    ports:
      - "5432:5432"
    volumes:
      - grimoire-postgres:/var/lib/postgresql/data

volumes:
  grimoire-postgres:
